version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: perapulse-postgres
    environment:
      POSTGRES_USER: perapulse
      POSTGRES_PASSWORD: perapulse_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perapulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak ────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: perapulse-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: perapulse
      KC_DB_PASSWORD: perapulse_secret
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Redpanda (Kafka-compatible) ─────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: perapulse-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: perapulse-redpanda-console
    environment:
      CONFIG_FILEPATH: /etc/rpConsole/config.yaml
    volumes:
      - ./redpanda/console-config.yaml:/etc/rpConsole/config.yaml
    ports:
      - "8888:8080"
    depends_on:
      - redpanda

  # ─── Microservices ────────────────────────────────────────────
  user-service:
    build: ../services/user-service
    container_name: perapulse-user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  feed-service:
    build: ../services/feed-service
    container_name: perapulse-feed-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/feed_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  opportunities-service:
    build: ../services/opportunities-service
    container_name: perapulse-opportunities-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opportunities_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  events-service:
    build: ../services/events-service
    container_name: perapulse-events-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/events_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  notification-service:
    build: ../services/notification-service
    container_name: perapulse-notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  analytics-service:
    build: ../services/analytics-service
    container_name: perapulse-analytics-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics_db
      SPRING_DATASOURCE_USERNAME: perapulse
      SPRING_DATASOURCE_PASSWORD: perapulse_secret
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  api-gateway:
    build: ../services/api-gateway
    container_name: perapulse-api-gateway
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/auth/realms/perapulse
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      USER_SERVICE_URL: http://user-service:8081
      FEED_SERVICE_URL: http://feed-service:8082
      OPPORTUNITIES_SERVICE_URL: http://opportunities-service:8083
      EVENTS_SERVICE_URL: http://events-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ANALYTICS_SERVICE_URL: http://analytics-service:8086
    ports:
      - "8080:8080"
    depends_on:
      keycloak:
        condition: service_started
      user-service:
        condition: service_started

  # ─── React Web App ────────────────────────────────────────────
  # Uncomment once the React client is scaffolded
  # react-web:
  #   build: ./clients/web
  #   container_name: perapulse-web
  #   ports:
  #     - "3000:80"

volumes:
  postgres_data:
