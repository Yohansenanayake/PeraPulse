---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opportunities-service
  namespace: perapulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opportunities-service
  template:
    metadata:
      labels:
        app: opportunities-service
    spec:
      containers:
        - name: opportunities-service
          image: <ACR_LOGIN_SERVER>/perapulse/opportunities-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/opportunities_db"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: opportunities-service
  namespace: perapulse
spec:
  selector:
    app: opportunities-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
