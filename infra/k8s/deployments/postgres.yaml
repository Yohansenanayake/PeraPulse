---
# ── Headless Service (required by StatefulSet for stable pod DNS) ───────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: perapulse
spec:
  clusterIP: None          # headless — DNS resolves directly to the pod IP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── StatefulSet ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: perapulse
spec:
  serviceName: postgres    # must match the headless service above
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: "perapulse"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "perapulse"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
  # ── PVC managed by the StatefulSet (bound to postgres-0) ─────────────────
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: managed-csi    # Azure Standard SSD
        resources:
          requests:
            storage: 10Gi
