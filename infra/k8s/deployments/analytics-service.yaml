---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: perapulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: perapulseacr.azurecr.io/perapulse/analytics-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/analytics_db"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: perapulse
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
