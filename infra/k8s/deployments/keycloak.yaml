---
# ── ConfigMap for Keycloak realm JSON ─────────────────────────────────────
# NOTE: This ConfigMap is created imperatively from the realm file.
# Run this BEFORE applying this manifest:
#
#   kubectl create configmap keycloak-realm \
#     --from-file=perapulse-realm.json=infra/keycloak/perapulse-realm.json \
#     --namespace perapulse

---
# ── Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: perapulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.5
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres:5432/keycloak_db"
            - name: KC_DB_USERNAME
              value: "perapulse"
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KC_DB_PASSWORD
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_HTTP_MANAGEMENT_RELATIVE_PATH
              value: "/"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME
              value: "https://api.perapulse.org/auth"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            # KC_HOSTNAME_STRICT_HTTPS removed — deprecated v1 option in Keycloak 26.x
            # Use KC_HOSTNAME (with https:// prefix) to signal HTTPS instead
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "750m"
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm

---
# ── Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: perapulse
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
