apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: perapulse
type: Opaque
data:
  # Base64-encoded values (security is not the first priority for this setup)
  # "perapulse_secret" → base64
  SPRING_DATASOURCE_PASSWORD: cGVyYXB1bHNlX3NlY3JldA==
  # "admin" → base64
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW4=
  # "perapulse_secret" → base64  (Keycloak DB user password same as app DB password)
  KC_DB_PASSWORD: cGVyYXB1bHNlX3NlY3JldA==
