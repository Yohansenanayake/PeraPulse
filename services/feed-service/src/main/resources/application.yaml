server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: feed-service

  # ── Database ──────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/feed_db}
    username: ${SPRING_DATASOURCE_USERNAME:perapulse}
    password: ${SPRING_DATASOURCE_PASSWORD:perapulse_secret}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Security — Keycloak JWT ───────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/auth/realms/perapulse}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://keycloak:8080/auth/realms/perapulse/protocol/openid-connect/certs}

  # ── Kafka (Redpanda in dev) ───────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ── Actuator ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── App info ──────────────────────────────────
info:
  app:
    name: PeraPulse Feed Service
    description: Social feed service for posts, comments, and likes.
    support-email: contact@perapulse.local

# ── Custom props ──────────────────────────────
user-service:
  base-url: ${USER_SERVICE_URL:http://localhost:8081}
