openapi: 3.0.3
info:
  title: PeraPulse — Notification Service API
  description: Manages in-app notifications (event-driven via Kafka).
  version: 1.0.0

servers:
  - url: https://{host}/api
    variables:
      host:
        default: localhost:8080

tags:
  - name: Notifications

paths:
  /notifications:
    get:
      tags: [Notifications]
      summary: Get my notifications (paginated, newest first)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedNotifications'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get count of unread notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Marked as read
        "404":
          $ref: '#/components/responses/NotFound'

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked as read

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userSub:
          type: string
        type:
          type: string
          example: POST_LIKED
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PagedNotifications:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        totalElements:
          type: integer
        page:
          type: integer
        size:
          type: integer
        unreadCount:
          type: integer

  responses:
    Unauthorized:
      description: Missing or invalid JWT
    NotFound:
      description: Resource not found
