openapi: 3.0.3
info:
  title: PeraPulse — Feed Service API
  description: Manages posts, comments, and likes.
  version: 1.0.0

servers:
  - url: https://{host}/api
    variables:
      host:
        default: localhost:8080

tags:
  - name: Posts
  - name: Comments
  - name: Likes

paths:
  /posts:
    post:
      tags: [Posts]
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        "401":
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Posts]
      summary: Get feed (paginated, newest first)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPosts'

  /posts/{postId}:
    get:
      tags: [Posts]
      summary: Get a single post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Posts]
      summary: Delete a post (owner or ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /posts/{postId}/comments:
    post:
      tags: [Comments]
      summary: Add a comment to a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'

    get:
      tags: [Comments]
      summary: Get comments for a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedComments'

  /posts/{postId}/likes:
    post:
      tags: [Likes]
      summary: Like a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Like added
        "409":
          description: Already liked

    delete:
      tags: [Likes]
      summary: Unlike a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Like removed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        authorSub:
          type: string
        content:
          type: string
        mediaUrl:
          type: string
        likeCount:
          type: integer
        commentCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreatePostRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        mediaUrl:
          type: string

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
        authorSub:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string

    PagedPosts:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        totalElements:
          type: integer
        page:
          type: integer
        size:
          type: integer

    PagedComments:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        totalElements:
          type: integer
        page:
          type: integer
        size:
          type: integer

  responses:
    Unauthorized:
      description: Missing or invalid JWT
    Forbidden:
      description: Insufficient role
    NotFound:
      description: Resource not found
