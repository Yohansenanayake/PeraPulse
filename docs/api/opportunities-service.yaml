openapi: 3.0.3
info:
  title: PeraPulse Opportunities Service
  description: API for managing job and internship opportunities and applications.
  version: 0.0.1
servers:
  - url: /api
    description: API Gateway path
paths:
  /opportunities:
    post:
      summary: Create a new opportunity
      tags:
        - Opportunities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpportunityRequest'
      responses:
        '201':
          description: Opportunity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '403':
          description: Forbidden - Requires ALUMNI or ADMIN role
    get:
      summary: List opportunities
      tags:
        - Opportunities
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [JOB, INTERNSHIP]
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, CLOSED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A paginated list of opportunities
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpportunityResponse'
                  totalElements:
                    type: integer

  /opportunities/{id}:
    get:
      summary: Get opportunity details
      tags:
        - Opportunities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Opportunity details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '404':
          description: Opportunity not found
    put:
      summary: Update an opportunity
      tags:
        - Opportunities
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpportunityRequest'
      responses:
        '200':
          description: Opportunity updated
        '403':
          description: Forbidden - Requires owner or ADMIN
    delete:
      summary: Delete an opportunity
      tags:
        - Opportunities
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Opportunity deleted
        '403':
          description: Forbidden - Requires owner or ADMIN

  /opportunities/{id}/apply:
    post:
      summary: Apply for an opportunity
      tags:
        - Applications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitApplicationRequest'
      responses:
        '201':
          description: Application submitted
        '409':
          description: Conflict - Already applied

  /opportunities/{id}/applications:
    get:
      summary: List applications for an opportunity
      tags:
        - Applications
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationResponse'
        '403':
          description: Forbidden - Requires owner or ADMIN

  /applications/me:
    get:
      summary: List my applications
      tags:
        - Applications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of my applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationResponse'

  /applications/{appId}/status:
    put:
      summary: Update application status
      tags:
        - Applications
      security:
        - bearerAuth: []
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationStatusRequest'
      responses:
        '200':
          description: Status updated
        '403':
          description: Forbidden - Requires listing owner or ADMIN

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateOpportunityRequest:
      type: object
      required: [type, title, company]
      properties:
        type:
          type: string
          enum: [JOB, INTERNSHIP]
        title:
          type: string
          maxLength: 500
        company:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        deadline:
          type: string
          format: date
    UpdateOpportunityRequest:
      type: object
      required: [title, company, status]
      properties:
        title:
          type: string
          maxLength: 500
        company:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        deadline:
          type: string
          format: date
        status:
          type: string
          enum: [OPEN, CLOSED]
    OpportunityResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdBySub:
          type: string
        type:
          type: string
        title:
          type: string
        company:
          type: string
        description:
          type: string
        location:
          type: string
        deadline:
          type: string
          format: date
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    SubmitApplicationRequest:
      type: object
      properties:
        coverLetter:
          type: string
        resumeUrl:
          type: string
          maxLength: 500
    UpdateApplicationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [PENDING, REVIEWED, ACCEPTED, REJECTED]
    ApplicationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        opportunityId:
          type: string
          format: uuid
        applicantSub:
          type: string
        coverLetter:
          type: string
        resumeUrl:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
