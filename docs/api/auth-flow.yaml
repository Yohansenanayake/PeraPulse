openapi: 3.0.3
info:
  title: PeraPulse — Auth & Login Flow API
  description: |
    OpenAPI spec for testing Keycloak OIDC login and token lifecycle in Postman.

    Local environment defaults:
    - Gateway base URL: `http://localhost:8080`
    - Realm: `perapulse`
    - Public client: `perapulse-web-test`

    Notes:
    - Use Authorization Code + PKCE for login.
    - Direct access grant (password grant) is disabled in current realm config.
  version: 1.0.0

servers:
  - url: http://localhost:8080/auth/realms/perapulse/protocol/openid-connect
    description: Keycloak OIDC endpoints through API Gateway

tags:
  - name: OIDC
  - name: Gateway Smoke

paths:
  /auth:
    get:
      tags: [OIDC]
      summary: Start login (Authorization Code + PKCE)
      description: Redirects user to Keycloak login page and returns an authorization code to redirect URI.
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
            default: perapulse-web-test
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
            default: code
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            example: http://localhost:8080/callback
        - name: scope
          in: query
          required: true
          schema:
            type: string
            default: openid profile email roles
        - name: state
          in: query
          required: true
          schema:
            type: string
            example: postman-state-123
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
            example: yQzR2h4Y2xVWWxQb1I4eENnS2F6U0hNQ0N6NndJQ2xkbG4wM0xLNA
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum: [S256]
            default: S256
      responses:
        "302":
          description: Redirect to login / callback

  /token:
    post:
      tags: [OIDC]
      summary: Exchange code or refresh token
      description: |
        Exchange authorization code for tokens, or refresh an access token.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: "#/components/schemas/AuthCodeTokenRequest"
                - $ref: "#/components/schemas/RefreshTokenRequest"
            examples:
              authCode:
                summary: Authorization Code + PKCE
                value:
                  grant_type: authorization_code
                  client_id: perapulse-web-test
                  code: "<authorization_code>"
                  redirect_uri: http://localhost:8080/callback
                  code_verifier: "<pkce_code_verifier>"
              refresh:
                summary: Refresh token
                value:
                  grant_type: refresh_token
                  client_id: perapulse-web-test
                  refresh_token: "<refresh_token>"
      responses:
        "200":
          description: Access token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /userinfo:
    get:
      tags: [OIDC]
      summary: Get user claims from access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User claims
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /logout:
    post:
      tags: [OIDC]
      summary: End user session
      description: Invalidates session and optionally redirects.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out
        "400":
          $ref: "#/components/responses/BadRequest"

  /certs:
    get:
      tags: [OIDC]
      summary: Get realm JWKS
      responses:
        "200":
          description: Public keys
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/users/info:
    get:
      tags: [Gateway Smoke]
      summary: Call protected user-service test endpoint through gateway
      servers:
        - url: http://localhost:8080
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/profiles/me:
    get:
      tags: [Gateway Smoke]
      summary: Call protected profile endpoint through gateway
      servers:
        - url: http://localhost:8080
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    keycloakAuthCode:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8080/auth/realms/perapulse/protocol/openid-connect/auth
          tokenUrl: http://localhost:8080/auth/realms/perapulse/protocol/openid-connect/token
          scopes:
            openid: OpenID Connect scope
            profile: Basic profile claims
            email: Email claims
            roles: Realm/client role claims

  schemas:
    AuthCodeTokenRequest:
      type: object
      required: [grant_type, client_id, code, redirect_uri, code_verifier]
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
        client_id:
          type: string
          example: perapulse-web-test
        code:
          type: string
        redirect_uri:
          type: string
          example: http://localhost:8080/callback
        code_verifier:
          type: string

    RefreshTokenRequest:
      type: object
      required: [grant_type, client_id, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        client_id:
          type: string
          example: perapulse-web-test
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [client_id, refresh_token]
      properties:
        client_id:
          type: string
          example: perapulse-web-test
        refresh_token:
          type: string
        post_logout_redirect_uri:
          type: string
          example: http://localhost:8080/

    TokenResponse:
      type: object
      required:
        - access_token
        - expires_in
        - refresh_expires_in
        - refresh_token
        - token_type
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_expires_in:
          type: integer
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        id_token:
          type: string
        not-before-policy:
          type: integer
        session_state:
          type: string
        scope:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid token.
    BadRequest:
      description: Invalid request payload or OAuth parameters.
