openapi: 3.0.3
info:
  title: PeraPulse — User/Profile Service API
  description: Manages user profiles and alumni role requests.
  version: 1.0.0

servers:
  - url: https://{host}/api
    variables:
      host:
        default: localhost:8080

tags:
  - name: Profiles
  - name: Role Requests
  - name: Admin

paths:
  /profiles/me:
    get:
      tags: [Profiles]
      summary: Get my profile
      description: Returns the authenticated user's profile. Auto-creates one from JWT claims on first call.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [Profiles]
      summary: Update my profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /profiles/{userSub}:
    get:
      tags: [Profiles]
      summary: Get a user's public profile
      security:
        - bearerAuth: []
      parameters:
        - name: userSub
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          $ref: "#/components/responses/NotFound"

  /profiles/role-requests:
    post:
      tags: [Role Requests]
      summary: Submit an alumni role request (STUDENT only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleRequestCreate"
      responses:
        "201":
          description: Role request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users:
    get:
      tags: [Admin]
      summary: List all users (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [STUDENT, ALUMNI, ADMIN]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUserProfiles"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users/{userSub}:
    get:
      tags: [Admin]
      summary: Get user details (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: userSub
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/role-requests:
    get:
      tags: [Admin]
      summary: List alumni role requests (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
      responses:
        "200":
          description: List of role requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/role-requests/{requestId}/approve:
    put:
      tags: [Admin]
      summary: Approve a role request (ADMIN only) — assigns ALUMNI role in Keycloak
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/role-requests/{requestId}/reject:
    put:
      tags: [Admin]
      summary: Reject a role request (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        keycloakSub:
          type: string
        role:
          type: string
          enum: [STUDENT, ALUMNI, ADMIN]
        displayName:
          type: string
        email:
          type: string
        department:
          type: string
        gradYear:
          type: integer
        bio:
          type: string
        linkedinUrl:
          type: string
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        linkedinUrl:
          type: string
        avatarUrl:
          type: string
        gradYear:
          type: integer

    RoleRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userSub:
          type: string
        requestedRole:
          type: string
          example: ALUMNI
        graduationYear:
          type: integer
        evidenceText:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        reviewedBySub:
          type: string
        createdAt:
          type: string
          format: date-time

    RoleRequestCreate:
      type: object
      required: [graduationYear]
      properties:
        graduationYear:
          type: integer
        evidenceText:
          type: string

    PagedUserProfiles:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ErrorResponse:
      description: Standard error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
