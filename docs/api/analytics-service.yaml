openapi: 3.0.3
info:
  title: PeraPulse — Analytics Service API
  description: Provides aggregated platform statistics for the admin dashboard (event-driven via Kafka).
  version: 1.0.0

servers:
  - url: https://{host}/api
    variables:
      host:
        default: localhost:8080

tags:
  - name: Analytics

paths:
  /analytics/summary:
    get:
      tags: [Analytics]
      summary: Get platform summary totals (ADMIN only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryStats'
        "403":
          $ref: '#/components/responses/Forbidden'

  /analytics/daily:
    get:
      tags: [Analytics]
      summary: Get daily stats for a date range (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-07"
      responses:
        "200":
          description: Daily stats array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyStat'
        "403":
          $ref: '#/components/responses/Forbidden'

  /analytics/top-posts:
    get:
      tags: [Analytics]
      summary: Get top liked posts (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopPost'
        "403":
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SummaryStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalPosts:
          type: integer
        totalOpportunities:
          type: integer
        totalApplications:
          type: integer
        totalEvents:
          type: integer
        upcomingEvents:
          type: integer

    DailyStat:
      type: object
      properties:
        statDate:
          type: string
          format: date
        newPosts:
          type: integer
        newLikes:
          type: integer
        newApplications:
          type: integer
        newRsvps:
          type: integer
        newEvents:
          type: integer

    TopPost:
      type: object
      properties:
        postId:
          type: string
          format: uuid
        likeCount:
          type: integer

  responses:
    Forbidden:
      description: Insufficient role — ADMIN required
